version: 2

models:
  - name: stg_insee_pop_2024
    description: "Données INSEE 2024 normalisées (region, gender, age_group, population)."

    columns:
      - name: region
        description: "Nom de la région."
        tests:
          - not_null

      - name: gender
        description: "Sexe (ALL, HOMME, FEMME)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["ALL", "HOMME", "FEMME"]

      - name: age_group
        description: "Tranche d'âge normalisée."
        tests:
          - not_null

      - name: population
        description: "Population correspondante."
        tests:
          - not_null
