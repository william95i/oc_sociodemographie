version: 2

models:
  - name: fct_students
    description: "Table finale des étudiants, nettoyée et normalisée, utilisée pour l'analyse sociodémographique."

    columns:
      - name: user_id
        description: "Identifiant unique de l'étudiant."
        tests:
          - not_null
          - unique

      - name: path_category
        description: "Catégorie du parcours suivi par l'étudiant."
        tests:
          - not_null

      - name: age_group
        description: "Classe d'âge de l'étudiant."
        tests:
          - not_null

      - name: gender
        description: "Genre normalisé de l'étudiant."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["HOMME", "FEMME", "INCONNU"]

      - name: region
        description: "Région de résidence de l'étudiant."
        tests:
          - not_null

      - name: year_path_started
        description: "Année de début du parcours."
        tests:
          - not_null
